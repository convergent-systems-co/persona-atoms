name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: e1fe0f0ce8ff18da4edc118372c30022
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Verify CLOUDFLARE_API_TOKEN secret is set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN secret — set at the convergent-systems-co org level"
            exit 1
          fi

      - name: Install web deps
        working-directory: ./web
        run: npm ci

      - name: Build site
        working-directory: ./web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: ./web
        run: npx --yes wrangler@latest pages deploy dist --project-name persona-atoms --branch main